name: 🐛 Bug report
description: Something in the SDK doesn't work as expected
title: "[BUG] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        ⚠️ For **security vulnerabilities**, do not open an issue — see our
        [security policy](https://github.com/Amayyas/Flutter-AI-SDK/blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened, and what did you expect to happen instead?
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider concerned
      multiple: true
      options:
        - OpenAI
        - Anthropic
        - Google AI
        - Ollama
        - Not provider-specific
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest code snippet that reproduces the issue. **Remove any API key.**
      render: dart
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: flutter_ai_sdk version
      placeholder: "1.3.0"
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter/Dart version
      description: Output of `flutter --version` (first line)
      placeholder: "Flutter 3.44.4"

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Stack trace or error message, if any. **Redact API keys.**
      render: text
