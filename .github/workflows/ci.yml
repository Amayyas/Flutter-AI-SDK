name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        # Info-level lints don't fail the build; errors and warnings do.
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
