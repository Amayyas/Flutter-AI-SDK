name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # must match the tag pattern on pub.dev

jobs:
  # Publishes to pub.dev using OIDC (no long-lived secret).
  # Requires "Automated publishing from GitHub Actions" to be enabled on
  # https://pub.dev/packages/flutter_ai_sdk/admin with tag pattern v{{version}}
  # and the GitHub Actions environment "pub.dev".
  publish:
    permissions:
      id-token: write # Required for OIDC authentication with pub.dev
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: pub.dev

  # Creates the GitHub release with the matching CHANGELOG section as notes.
  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog notes for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver " " || $0 ~ "^## " ver "$" { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if ! [ -s release-notes.md ]; then
            echo "No CHANGELOG section found for $VERSION" > release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --latest
